<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" width="920" height="470" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">
  <!-- window chrome -->
  <rect x="1" y="1" width="918" height="468" rx="10" fill="#0d1117" stroke="#222b36"/>
  <rect x="1" y="1" width="918" height="34" rx="10" fill="#161b22"/>
  <rect x="1" y="24" width="918" height="11" fill="#161b22"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="18" r="6" fill="#febc2e"/>
  <circle cx="62" cy="18" r="6" fill="#28c840"/>
  <text x="460" y="22" text-anchor="middle" fill="#5d6b7a" font-size="12">musubi — knowledge graph CLI</text>

  <text x="20" y="68"><tspan fill="#28c840">$</tspan> <tspan fill="#e6edf3">musubi map --by collection</tspan></text>
  <text x="20" y="94" fill="#00ffc8">## agents  (4)</text>
  <text x="20" y="116" fill="#8a9aaa">- Agent Memory <tspan fill="#39c5ff">&#10052;</tspan> — file-based vs db-backed memory</text>
  <text x="20" y="138" fill="#c8d3d3">- System Prompts That Actually Work — agent, prompt, system prompt</text>
  <text x="20" y="160" fill="#00ffc8">## inference  (5)</text>
  <text x="20" y="182" fill="#c8d3d3">- vLLM FP8 KV Cache Causes Output Repetition — fp8, kv cache</text>

  <text x="20" y="222"><tspan fill="#28c840">$</tspan> <tspan fill="#e6edf3">musubi health</tspan></text>
  <text x="20" y="248" fill="#00ffc8">&#9671; KB health — 20 notes</text>
  <text x="40" y="270" fill="#8a9aaa">link coverage: <tspan fill="#febc2e">7/20 (35%)</tspan> connected to &#8805;1 other note</text>
  <text x="20" y="298" fill="#e6edf3">&#9312; ORPHANS (not woven in): <tspan fill="#39c5ff">13</tspan></text>
  <text x="40" y="320" fill="#5d6b7a">&#10052; [webdev] React Server Components: Three Gotchas</text>
  <text x="40" y="342" fill="#5d6b7a">&#10052; [devops] PostgreSQL Autovacuum Deadlock During Migration</text>
  <text x="20" y="372" fill="#e6edf3">&#9313; HUB CONCEPTS (low signal): <tspan fill="#28c840">0</tspan>&#160;&#160;&#183;&#160;&#160;&#9314; DANGLING REFS: <tspan fill="#28c840">0</tspan></text>

  <text x="20" y="438"><tspan fill="#28c840">$</tspan></text>
  <rect x="36" y="426" width="9" height="16" fill="#e6edf3">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
